<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#1a1e3a"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- π legs in cream, drawn as closed paths with swept feet -->
  <g fill="#efeae0">

    <!-- Left leg: body + right-side mini serif + left outward foot -->
    <path d="
      M 130 240 L 178 240 L 178 356
      C 178 378 194 394 198 398 L 182 398
      C 176 392 163 378 163 358 L 150 358
      C 150 380 130 396 102 400 L 86 400
      C 66 400 58 386 58 374
      C 58 358 72 350 90 350
      L 130 350 Z
    "/>

    <!-- Right leg: mirror of left -->
    <path d="
      M 334 240 L 382 240 L 382 350
      L 422 350
      C 440 350 454 358 454 374
      C 454 386 446 400 426 400 L 410 400
      C 382 396 362 380 362 358 L 349 358
      C 349 378 336 392 330 398 L 314 398
      C 318 394 334 378 334 356 Z
    "/>

  </g>

  <!-- Crossbar in cyan — sits on top of both legs -->
  <rect x="90" y="188" width="332" height="56" rx="14" fill="#6dd6e8"/>
</svg>
